<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SecOrch Hacker UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body style="margin:0; background:#050607;">
  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Workaround for lucide-react UMD expecting window.react instead of window.React -->
  <script>window.react = window.React;</script>

  <!-- Dependencies for UMD builds -->
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/react-is/umd/react-is.production.min.js"></script>

  <!-- Recharts (UMD exposes window.Recharts) -->
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

  <!-- Lucide React (UMD exposes window.LucideReact) -->
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.min.js"></script>

  <!-- Babel for JSX in app.js -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App (JSX) -->
  <script type="text/babel" src="./app.js"></script>
</body>
</html>
