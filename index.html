<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>StartupOne – SecOrch Hacker UI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
</head>

<body style="margin:0; background:#050607;">
  <div id="root"></div>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Required by Recharts -->
  <script src="https://unpkg.com/react-is/umd/react-is.production.min.js"></script>
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>

  <!-- Recharts (defines window.Recharts) -->
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

  <!-- Lucide React (defines window.LucideReact) -->
  <script src="https://unpkg.com/lucide-react/dist/umd/lucide-react.min.js"></script>

  <!-- Babel (needed because app.js contains JSX) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App -->
  <script type="text/babel" src="./app.js"></script>
</body>
</html>
